# status.yaml
# Controls the local agent loop. Tracked by Git so changes propagate to all
# clones and agents. Agents must pull the latest before reading this file.
#
# status values:
#   active  - agent works normally
#   paused  - temporary hold; agent logs each wake and waits without doing work
#   blocked - blocked on a specific decision, resource, credential, or validation
#   stopped - loop permanently halted; project complete or deliberately shut down
#   error   - severe repo or automation failure; agent should log details and halt
#   working - agent is actively working on a task; other agents should skip

