version: "3.9"

services:
  db:
    image: postgres:18
    container_name: project-status-db
    environment:
      POSTGRES_DB: project_status
      POSTGRES_USER: project_status
      POSTGRES_PASSWORD: project_status_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U project_status -d project_status"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: project-status-api
    environment:
      DATABASE_URL: postgresql://project_status:project_status_dev@db:5432/project_status
      APP_ENV: local
      FLASK_ENV: development
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./api:/app
    command: flask --app project_status_api run --host=0.0.0.0

  web:
    build:
      context: ./web
      target: develop
    container_name: project-status-web
    environment:
      VITE_API_BASE_URL: http://localhost:5000
    ports:
      - "3000:3000"
    depends_on:
      - api
    volumes:
      - ./web:/app
      - /app/node_modules

  migrations:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: project-status-migrations
    environment:
      DATABASE_URL: postgresql://project_status:project_status_dev@db:5432/project_status
      APP_ENV: local
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./api:/app
    command: alembic -c alembic.ini upgrade head

volumes:
  postgres_data:

